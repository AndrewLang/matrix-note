<div class="max-w-2xl">
  <h3 class="mb-2 text-lg font-semibold">General</h3>
  <p class="mb-6 text-sm text-gray-600 dark:text-gray-400">Control how note edits are persisted while you work.</p>

  <div class="rounded-lg border border-black/10 bg-white/70 p-4 dark:border-white/10 dark:bg-white/5">
    <div class="flex items-center justify-between gap-4">
      <div>
        <div class="text-sm font-medium">Auto Save</div>
        <div class="mt-1 text-xs text-gray-600 dark:text-gray-400">
          Save note edits automatically shortly after changes are made.
        </div>
      </div>
      <label class="relative inline-flex cursor-pointer items-center">
        <input type="checkbox" class="peer sr-only" [checked]="isAutoSaveEnabled()"
          (change)="setAutoSaveEnabled($any($event.target).checked)" />
        <div
          class="h-5 w-9 rounded-full bg-gray-300 peer-focus:outline-none peer-checked:bg-blue-500 peer-checked:after:translate-x-full peer-checked:after:border-white after:absolute after:left-[2px] after:top-[2px] after:h-4 after:w-4 after:rounded-full after:border after:border-gray-500 after:bg-white after:transition-all after:content-[''] dark:bg-gray-700 dark:border-gray-600">
        </div>
      </label>
    </div>
  </div>
</div>
