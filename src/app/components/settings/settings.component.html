<div class="flex h-full min-h-0 overflow-hidden">
  <div class="flex w-[200px] flex-col gap-1 overflow-y-auto border-r border-black/10 p-3 dark:border-white/5">
    @for (tab of tabs; track tab.id) {
    @if (tab.bottom) {
    <div class="flex-1"></div>
    }
    <button (click)="selectTab(tab.id)" class="rounded-lg px-3 py-2 text-left text-sm font-medium transition-colors"
      [ngClass]="
          activeTab() === tab.id
            ? 'bg-black/30 text-blue-700 dark:bg-white/10 dark:text-blue-400'
            : 'text-gray-700 hover:bg-black/30 dark:text-gray-400 dark:hover:bg-white/5'
        ">
      {{ tab.label }}
    </button>
    }
  </div>

  <div class="flex-1 overflow-y-auto bg-white/25 p-6 text-gray-900 dark:bg-black/10 dark:text-gray-200">
    @if (activeTab() === 'general') {
    <mtx-general-setting />
    }

    @if (activeTab() === 'appearance') {
    <mtx-appearance-setting />
    }

    @if (activeTab() === 'ai') {
    <mtx-ai-setting />
    }

    @if (activeTab() === 'about') {
    <mtx-about-setting />
    }
  </div>
</div>
