<div class="max-w-2xl">
  <h3 class="mb-4 text-lg font-semibold">Appearance</h3>
  <p class="mb-6 text-sm text-gray-600 dark:text-gray-400">Choose the application theme used across the shell and
    content areas.</p>
  <div class="flex flex-col gap-4">
    @for (option of themeOptions; track option.value) {
    <button type="button" (click)="setTheme(option.value)" class="rounded-lg border p-4 text-left transition-colors"
      [ngClass]="
        selectedTheme() === option.value
          ? 'border-blue-600 bg-blue-500/12 shadow-sm'
          : 'border-black/10 bg-white/70 hover:border-black/20 dark:border-white/10 dark:bg-white/5 dark:hover:border-white/20'
      ">
      <div class="mb-3 flex items-center justify-between">
        <div class="text-sm font-semibold">{{ option.label }}</div>
        <div class="h-3 w-3 rounded-full"
          [ngClass]="option.value === appThemes.Dark ? 'bg-zinc-900 ring-2 ring-zinc-500/50' : 'bg-white ring-2 ring-slate-300'">
        </div>
      </div>
      <div class="text-xs text-gray-600 dark:text-gray-400">{{ option.description }}</div>
    </button>
    }
  </div>
</div>
