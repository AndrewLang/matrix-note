<div class="max-w-2xl">
  <h3 class="mb-4 text-lg font-semibold">AI</h3>
  <div class="space-y-6">
    <div>
      <label class="mb-1.5 block text-sm font-medium">AI Provider</label>

      <div class="relative">
        <select class="w-full rounded-lg border border-black/15 bg-white/80 px-3 py-2.5 text-sm focus:outline-none focus:ring-2
        appearance-none focus:ring-blue-500/50 dark:border-white/10 dark:bg-black/20" [value]="selectedAiProvider()"
          disabled (change)="setAiProvider($any($event.target).value)">
          @for (option of aiProviderOptions; track option.value) {
          <option [value]="option.value">{{ option.label }}</option>
          }
        </select>

        <svg class="pointer-events-none absolute text-neutral-400"
          [ngStyle]="{right: chevronRight(),top: '50%',transform: 'translateY(-50%)'}" [attr.width]="chevronSize()"
          [attr.height]="chevronSize()" viewBox="0 0 24 24">
          <path fill="currentColor" d="M7 10l5 5 5-5H7z" />
        </svg>
      </div>

      <div class="mt-2 text-xs text-gray-600 dark:text-gray-400">
        @for (option of aiProviderOptions; track option.value) {
        @if (selectedAiProvider() === option.value) {
        {{ option.description }}
        }
        }
      </div>
    </div>

    <div>
      <label class="mb-1.5 block text-sm font-medium">API Key</label>
      <input type="password"
        class="w-full rounded-lg border border-black/15 bg-white/80 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50 dark:border-white/10 dark:bg-black/20"
        placeholder="Paste provider API key" [ngModel]="aiApiKey()" (ngModelChange)="setAiApiKey($event)" disabled />
      <div class="mt-2 text-xs text-gray-600 dark:text-gray-400">
        Stored locally on this device. No validation is performed here.
      </div>
    </div>
  </div>
</div>
