<main class="flex-1 flex h-full min-h-0 flex-col min-w-0 relative">
  <div class="flex h-8 border-b border-black/5 dark:border-white/5 pr-1 items-end pt-1 overflow-x-auto select-none">
    @for (tab of tabs(); track tab.id) {
    <div (click)="selectTab(tab.id)" class="flex items-center px-1 font-medium cursor-pointer 
             gap-2 min-w-[150px] transition-colors" [ngClass]="
          activeTabId() === tab.id
            ? 'relative z-10 h-[30px] border border-b-0 border-black/5 bg-white/50 dark:border-white/[0.05] dark:bg-white/[0.06]'
            : 'h-[30px] border border-transparent hover:bg-black/5 dark:hover:bg-white/5 text-gray-500 dark:text-gray-400 hover:text-gray-800 dark:hover:text-gray-200'
        ">
      <mtx-svg name="document"
        [svgClass]="activeTabId() === tab.id ? 'h-3.5 w-3.5 text-blue-500' : 'h-3.5 w-3.5'"></mtx-svg>
      <span class="text-[13px] truncate flex-1">{{ tab.title }}</span>
      @if (tab.unsaved) {
      <div class="w-1.5 h-1.5 rounded-full bg-blue-500"></div>
      }
      <button (click)="closeTab(tab.id, $event)"
        class="w-5 h-5 flex items-center justify-center rounded-md transition-opacity"
        [ngClass]="activeTabId() === tab.id ? 'opacity-60 hover:opacity-100' : 'opacity-0 hover:opacity-100'"
        aria-label="Close tab" title="Close Note">
        &times;
      </button>
    </div>
    }

    <button type="button" (click)="addTab()"
      class="h-7 w-7 shrink-0 flex items-center justify-center text-gray-500 dark:text-gray-400 hover:bg-black/5 dark:hover:bg-white/10 hover:text-gray-800 dark:hover:text-gray-200 transition-colors"
      aria-label="Add tab">
      <mtx-svg name="plus" svgClass="h-4 w-4"></mtx-svg>
    </button>
  </div>

  <div class="flex-1 w-full h-full min-h-0 overflow-hidden flex flex-col relative">
    @for (tab of tabs(); track tab.id) {
    @if (activeTabId() === tab.id) {
    <mtx-workspace-tab [content]="tab.content" />
    }
    }
  </div>
</main>
