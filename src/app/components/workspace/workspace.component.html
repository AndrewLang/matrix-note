<main class="flex-1 flex h-full min-h-0 flex-col min-w-0 relative">
  <div
    class="flex h-11 border-b border-black/5 dark:border-white/5 px-4 items-end gap-1.5 pt-1 overflow-x-auto select-none"
  >
    @for (tab of tabs(); track tab.id) {
      <div
        (click)="selectTab(tab.id)"
        class="flex items-center px-4 rounded-t-lg font-medium cursor-pointer gap-2 min-w-[150px] transition-colors"
        [ngClass]="
          activeTabId() === tab.id
            ? 'h-[34px] mn-glass-tab-active relative z-10'
            : 'h-[32px] border border-transparent hover:bg-black/5 dark:hover:bg-white/5 text-gray-500 dark:text-gray-400 hover:text-gray-800 dark:hover:text-gray-200'
        "
      >
        <svg
          class="w-3.5 h-3.5"
          [ngClass]="activeTabId() === tab.id ? 'text-blue-500' : ''"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"
          ></path>
        </svg>
        <span class="text-[13px] truncate flex-1">{{ tab.title }}</span>
        @if (tab.unsaved) {
          <div class="w-1.5 h-1.5 rounded-full bg-blue-500"></div>
        }
        <button
          (click)="closeTab(tab.id, $event)"
          class="w-5 h-5 flex items-center justify-center rounded-md hover:bg-black/10 dark:hover:bg-white/10 transition-opacity"
          [ngClass]="activeTabId() === tab.id ? 'opacity-60 hover:opacity-100' : 'opacity-0 hover:opacity-100'"
          aria-label="Close tab"
        >
          &times;
        </button>
      </div>
    }

    <button
      type="button"
      (click)="addTab()"
      class="mb-0.5 h-7 w-7 shrink-0 rounded-md flex items-center justify-center text-gray-500 dark:text-gray-400 hover:bg-black/5 dark:hover:bg-white/10 hover:text-gray-800 dark:hover:text-gray-200 transition-colors"
      aria-label="Add tab"
    >
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
      </svg>
    </button>
  </div>

  <div class="flex-1 w-full h-full min-h-0 overflow-hidden flex flex-col relative">
    @for (tab of tabs(); track tab.id) {
      @if (activeTabId() === tab.id) {
        <app-workspace-tab [content]="tab.content" />
      }
    }
  </div>
</main>
