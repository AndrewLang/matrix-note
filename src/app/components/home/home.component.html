<div
  class="flex items-center justify-center p-8 h-screen text-gray-800 dark:text-gray-100 transition-colors duration-500 relative bg-slate-200 dark:bg-zinc-900"
>
  <div class="absolute inset-0 overflow-hidden z-0 pointer-events-none">
    <div
      class="dark:hidden absolute -top-[20%] -left-[10%] w-[60vw] h-[60vw] rounded-full bg-blue-300/30 blur-[100px] mix-blend-multiply"
    ></div>
    <div
      class="dark:hidden absolute top-[10%] -right-[10%] w-[50vw] h-[50vw] rounded-full bg-indigo-300/30 blur-[100px] mix-blend-multiply"
    ></div>
    <div
      class="dark:hidden absolute -bottom-[20%] left-[20%] w-[60vw] h-[60vw] rounded-full bg-purple-300/30 blur-[100px] mix-blend-multiply"
    ></div>

    <div
      class="hidden dark:block absolute -top-[10%] -left-[10%] w-[50vw] h-[50vw] rounded-full bg-indigo-600/20 blur-[120px] mix-blend-screen"
    ></div>
    <div
      class="hidden dark:block absolute top-[20%] -right-[10%] w-[40vw] h-[40vw] rounded-full bg-purple-600/15 blur-[120px] mix-blend-screen"
    ></div>
    <div
      class="hidden dark:block absolute -bottom-[10%] left-[10%] w-[50vw] h-[50vw] rounded-full bg-emerald-600/15 blur-[120px] mix-blend-screen"
    ></div>
  </div>

  <div class="w-full max-w-[1400px] h-full rounded-2xl overflow-hidden flex flex-col mn-glass-container z-10">
    <app-titlebar (openSettings)="openSettings()" />
    <div class="flex-1 flex overflow-hidden">
      <app-sidebar />
      <app-workspace />
    </div>
  </div>

  <app-settings [open]="isSettingsOpen()" (close)="closeSettings()" />
</div>
