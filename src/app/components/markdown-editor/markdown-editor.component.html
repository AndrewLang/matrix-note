<div class="flex-1 w-full h-full min-h-0 overflow-hidden flex flex-col relative">
  <div class="flex items-center gap-0.5 border-b border-black/5 px-4 py-2 dark:border-white/5">
    <button
      type="button"
      class="inline-flex h-[30px] w-[30px] items-center justify-center rounded-md text-gray-700 transition-colors hover:bg-black/[0.08] focus-visible:bg-black/[0.08] focus-visible:outline-none dark:text-gray-300 dark:hover:bg-white/10 dark:focus-visible:bg-white/10"
      aria-label="Bold"
    >
      <mtx-svg name="bold" svgClass="h-4 w-4"></mtx-svg>
    </button>
    <button
      type="button"
      class="inline-flex h-[30px] w-[30px] items-center justify-center rounded-md text-gray-700 transition-colors hover:bg-black/[0.08] focus-visible:bg-black/[0.08] focus-visible:outline-none dark:text-gray-300 dark:hover:bg-white/10 dark:focus-visible:bg-white/10"
      aria-label="Italic"
    >
      <mtx-svg name="italic" svgClass="h-4 w-4"></mtx-svg>
    </button>
    <button
      type="button"
      class="inline-flex h-[30px] w-[30px] items-center justify-center rounded-md text-gray-700 transition-colors hover:bg-black/[0.08] focus-visible:bg-black/[0.08] focus-visible:outline-none dark:text-gray-300 dark:hover:bg-white/10 dark:focus-visible:bg-white/10"
      aria-label="Heading"
    >
      <mtx-svg name="heading" svgClass="h-4 w-4"></mtx-svg>
    </button>
    <span class="mx-1 h-5 w-px bg-black/10 dark:bg-white/10"></span>
    <button
      type="button"
      class="inline-flex h-[30px] w-[30px] items-center justify-center rounded-md text-gray-700 transition-colors hover:bg-black/[0.08] focus-visible:bg-black/[0.08] focus-visible:outline-none dark:text-gray-300 dark:hover:bg-white/10 dark:focus-visible:bg-white/10"
      aria-label="Quote"
    >
      <mtx-svg name="quote" svgClass="h-4 w-4"></mtx-svg>
    </button>
    <button
      type="button"
      class="inline-flex h-[30px] w-[30px] items-center justify-center rounded-md text-gray-700 transition-colors hover:bg-black/[0.08] focus-visible:bg-black/[0.08] focus-visible:outline-none dark:text-gray-300 dark:hover:bg-white/10 dark:focus-visible:bg-white/10"
      aria-label="Code"
    >
      <mtx-svg name="code" svgClass="h-4 w-4"></mtx-svg>
    </button>
    <button
      type="button"
      class="inline-flex h-[30px] w-[30px] items-center justify-center rounded-md text-gray-700 transition-colors hover:bg-black/[0.08] focus-visible:bg-black/[0.08] focus-visible:outline-none dark:text-gray-300 dark:hover:bg-white/10 dark:focus-visible:bg-white/10"
      aria-label="List"
    >
      <mtx-svg name="list" svgClass="h-4 w-4"></mtx-svg>
    </button>
    <button
      type="button"
      class="inline-flex h-[30px] w-[30px] items-center justify-center rounded-md text-gray-700 transition-colors hover:bg-black/[0.08] focus-visible:bg-black/[0.08] focus-visible:outline-none dark:text-gray-300 dark:hover:bg-white/10 dark:focus-visible:bg-white/10"
      aria-label="Numbered List"
    >
      <mtx-svg name="numberedList" svgClass="h-4 w-4"></mtx-svg>
    </button>
    <span class="mx-1 h-5 w-px bg-black/10 dark:bg-white/10"></span>
    <button
      type="button"
      class="inline-flex h-[30px] w-[30px] items-center justify-center rounded-md text-gray-700 transition-colors hover:bg-black/[0.08] focus-visible:bg-black/[0.08] focus-visible:outline-none dark:text-gray-300 dark:hover:bg-white/10 dark:focus-visible:bg-white/10"
      aria-label="Link"
    >
      <mtx-svg name="link" svgClass="h-4 w-4"></mtx-svg>
    </button>
    <button
      type="button"
      class="inline-flex h-[30px] w-[30px] items-center justify-center rounded-md text-gray-700 transition-colors hover:bg-black/[0.08] focus-visible:bg-black/[0.08] focus-visible:outline-none dark:text-gray-300 dark:hover:bg-white/10 dark:focus-visible:bg-white/10"
      aria-label="Image"
    >
      <mtx-svg name="image" svgClass="h-4 w-4"></mtx-svg>
    </button>
    <button
      type="button"
      class="inline-flex h-[30px] w-[30px] items-center justify-center rounded-md text-gray-700 transition-colors hover:bg-black/[0.08] focus-visible:bg-black/[0.08] focus-visible:outline-none dark:text-gray-300 dark:hover:bg-white/10 dark:focus-visible:bg-white/10"
      aria-label="Preview"
    >
      <mtx-svg name="preview" svgClass="h-4 w-4"></mtx-svg>
    </button>
  </div>

  <textarea
    class="h-full min-h-0 w-full flex-1 resize-none border-0 bg-transparent px-8 py-4 text-[15px] leading-[1.7] text-gray-800 caret-slate-900 selection:bg-blue-500/20 focus:outline-none dark:text-gray-100 dark:caret-slate-50 dark:selection:bg-blue-400/25"
    [(ngModel)]="content"
  ></textarea>
</div>
