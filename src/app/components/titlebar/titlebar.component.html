<div data-tauri-drag-region
  class="flex h-9 w-full flex-shrink-0 select-none items-center justify-between border-b border-black/10 dark:border-white/5">
  <div class="flex items-center gap-2 pl-2 w-1/3">
    <img src="assets/images/logo.png" alt="Matrix Note" class="h-4 w-4 shrink-0">
    <span class="text-xs font-semibold opacity-80 truncate">Matrix Note</span>
  </div>

  <div class="flex-1 flex justify-center h-full items-center">
    <div data-no-drag
      class="flex h-6 w-[300px] items-center rounded-md border border-black/10 bg-black/8 px-2.5 text-[11px] transition-colors hover:bg-black/10 dark:border-transparent dark:bg-white/5 dark:hover:border-white/10">
      <mtx-svg name="search" svgClass="mr-2 h-3 w-3 opacity-60"></mtx-svg>
      <input data-tauri-drag-region="false" type="text" placeholder="Search files, contents..."
        class="bg-transparent border-none text-inherit focus:outline-none w-full placeholder-gray-500 dark:placeholder-gray-400" />
    </div>
  </div>

  <div class="flex h-full w-1/3 justify-end items-center">
    <button data-no-drag data-tauri-drag-region="false" id="github-btn" (click)="openGithub()"
      class="mr-1 flex h-7 w-7 items-center justify-center rounded-md transition-colors hover:bg-black/30 dark:hover:bg-white/10"
      title="Open GitHub Repository">
      <mtx-svg name="github" svgClass="h-4 w-4 text-gray-700 dark:text-gray-300"></mtx-svg>
    </button>
    <button data-no-drag data-tauri-drag-region="false" id="settings-btn" (click)="requestSettingsOpen()"
      class="mr-1 flex h-7 w-7 items-center justify-center rounded-md transition-colors hover:bg-black/30 dark:hover:bg-white/10"
      title="Settings">
      <mtx-svg name="settings" svgClass="h-4 w-4 text-gray-600 dark:text-gray-400"></mtx-svg>
    </button>

    <button data-no-drag data-tauri-drag-region="false" (click)="minimizeWindow()"
      class="flex h-full w-10 items-center justify-center opacity-60 transition-colors hover:bg-black/30 hover:opacity-100 dark:hover:bg-white/10">
      <mtx-svg name="windowMinimize" svgClass="h-2.5 w-2.5"></mtx-svg>
    </button>
    <button data-no-drag data-tauri-drag-region="false" (click)="toggleMaximizeWindow()"
      class="flex h-full w-10 items-center justify-center opacity-60 transition-colors hover:bg-black/30 hover:opacity-100 dark:hover:bg-white/10">
      <mtx-svg [name]="isMaximized() ? 'windowRestore' : 'windowMaximize'" svgClass="h-2.5 w-2.5"></mtx-svg>
    </button>
    <button data-no-drag data-tauri-drag-region="false" (click)="closeWindow()"
      class="w-10 h-full flex items-center justify-center opacity-60 hover:opacity-100 hover:bg-red-500 hover:text-white transition-colors">
      <mtx-svg name="windowClose" svgClass="h-2.5 w-2.5"></mtx-svg>
    </button>
  </div>
</div>
