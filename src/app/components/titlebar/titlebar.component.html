<div
  class="h-10 flex items-center justify-between flex-shrink-0 select-none w-full border-b border-black/5 dark:border-white/5 px-2"
>
  <div class="flex items-center gap-3 pl-1 w-1/3">
    <button
      id="sidebar-toggle"
      class="p-1.5 rounded-md hover:bg-black/5 dark:hover:bg-white/10 transition-colors opacity-80 hover:opacity-100 flex-shrink-0"
    >
      <svg class="w-4 h-4 text-gray-700 dark:text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
      </svg>
    </button>
    <svg class="w-4 h-4 text-blue-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"
      ></path>
    </svg>
    <span class="text-xs tracking-wider font-semibold opacity-80 uppercase truncate">Matrix Note</span>
  </div>

  <div class="flex-1 flex justify-center h-full items-center">
    <div
      class="flex items-center bg-black/5 dark:bg-white/5 rounded-md w-[300px] h-6 px-2.5 text-[11px] border border-transparent hover:border-black/10 dark:hover:border-white/10 transition-colors"
    >
      <svg class="w-3 h-3 opacity-60 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
      </svg>
      <input
        type="text"
        placeholder="Search files, contents..."
        class="bg-transparent border-none text-inherit focus:outline-none w-full placeholder-gray-500 dark:placeholder-gray-400"
      />
    </div>
  </div>

  <div class="flex h-full w-1/3 justify-end items-center">
    <button
      id="settings-btn"
      (click)="requestSettingsOpen()"
      class="w-7 h-7 flex items-center justify-center rounded-md hover:bg-black/5 dark:hover:bg-white/10 transition-colors mr-1"
      title="Settings"
    >
      <svg class="w-4 h-4 text-gray-600 dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"
        ></path>
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
      </svg>
    </button>
    <button
      id="theme-toggle"
      (click)="toggleTheme()"
      class="w-7 h-7 flex items-center justify-center rounded-md hover:bg-black/5 dark:hover:bg-white/10 transition-colors mr-3"
      title="Toggle Theme"
    >
      <svg class="hidden dark:block w-4 h-4 text-yellow-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"
        ></path>
      </svg>
      <svg class="block dark:hidden w-4 h-4 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"
        ></path>
      </svg>
    </button>

    <button
      class="w-10 h-full flex items-center justify-center opacity-60 hover:opacity-100 hover:bg-black/5 dark:hover:bg-white/10 transition-colors"
    >
      <svg class="w-2.5 h-2.5" stroke="currentColor" stroke-width="1.2" viewBox="0 0 10 10" fill="none">
        <path d="M 0 5 L 10 5" />
      </svg>
    </button>
    <button
      class="w-10 h-full flex items-center justify-center opacity-60 hover:opacity-100 hover:bg-black/5 dark:hover:bg-white/10 transition-colors"
    >
      <svg class="w-2.5 h-2.5" stroke="currentColor" stroke-width="1.2" viewBox="0 0 10 10" fill="none">
        <path d="M 1 1 L 9 1 L 9 9 L 1 9 Z" />
      </svg>
    </button>
    <button
      class="w-10 h-full flex items-center justify-center opacity-60 hover:opacity-100 hover:bg-red-500 hover:text-white transition-colors"
    >
      <svg class="w-2.5 h-2.5" stroke="currentColor" stroke-width="1.2" viewBox="0 0 10 10" fill="none">
        <path d="M 1 1 L 9 9 M 9 1 L 1 9" />
      </svg>
    </button>
  </div>
</div>
