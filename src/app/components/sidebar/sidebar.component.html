<aside id="app-sidebar"
  class="z-10 flex h-full w-[260px] flex-shrink-0 flex-col overflow-hidden border-r border-black/5 bg-white/20 transition-all duration-300 dark:border-white/[0.06] dark:bg-black/25">
  <div class="flex-1 overflow-y-auto pt-6 px-3 select-none text-sm custom-scrollbar">
    <div class="folder-group">
      <div
        class="flex items-center px-1.5 py-1.5 rounded-md hover:bg-black/5 dark:hover:bg-white/5 cursor-pointer text-gray-700 dark:text-gray-300 transition-colors"
        (click)="toggleFolderRecursive($event)">
        <app-svg name="chevronRight" svgClass="mr-2 h-3.5 w-3.5 shrink-0 rotate-90 opacity-60 transition-transform duration-200 ease-in-out"></app-svg>
        <app-svg name="folderSolid" svgClass="mr-2.5 h-4 w-4 shrink-0 text-blue-500 opacity-80"></app-svg>
        <span class="font-medium truncate">Projects</span>
      </div>

      <div class="pl-[22px] mt-0.5 folder-content" style="display: block">
        <div class="folder-group">
          <div
            class="flex items-center px-1.5 py-1.5 rounded-md hover:bg-black/5 dark:hover:bg-white/5 cursor-pointer text-gray-700 dark:text-gray-300 transition-colors"
            (click)="toggleFolderRecursive($event)">
            <app-svg name="chevronRight" svgClass="mr-2 h-3.5 w-3.5 shrink-0 rotate-90 opacity-60 transition-transform duration-200 ease-in-out"></app-svg>
            <app-svg name="folderOutline" svgClass="mr-2.5 h-4 w-4 shrink-0 text-sky-500 opacity-80"></app-svg>
            <span class="font-medium truncate">Aero Redesign</span>
          </div>

          <div class="pl-[22px] mt-0.5 folder-content" style="display: block">
            <div
              class="flex items-center px-1.5 py-1.5 rounded-md bg-black/5 dark:bg-white/10 cursor-pointer text-blue-600 dark:text-blue-400 transition-colors font-medium border border-black/5 dark:border-white/5">
              <app-svg name="document" svgClass="mr-2 h-4 w-4"></app-svg>
              <span>Architecture.md</span>
            </div>
            <div
              class="flex items-center px-1.5 py-1.5 rounded-md hover:bg-black/5 dark:hover:bg-white/5 cursor-pointer text-gray-600 dark:text-gray-400 transition-colors mt-0.5">
              <app-svg name="document" svgClass="mr-2 h-4 w-4"></app-svg>
              <span>Design-System.md</span>
            </div>
            <div
              class="flex items-center px-1.5 py-1.5 rounded-md hover:bg-black/5 dark:hover:bg-white/5 cursor-pointer text-gray-600 dark:text-gray-400 transition-colors mt-0.5">
              <app-svg name="cloud" svgClass="mr-2 h-4 w-4"></app-svg>
              <span>Assets/</span>
            </div>
          </div>
        </div>

        <div class="folder-group mt-0.5">
          <div
            class="flex items-center px-1.5 py-1.5 rounded-md hover:bg-black/5 dark:hover:bg-white/5 cursor-pointer text-gray-700 dark:text-gray-300 transition-colors"
            (click)="toggleFolderRecursive($event)">
            <app-svg name="chevronRight" svgClass="mr-2 h-3.5 w-3.5 shrink-0 opacity-60 transition-transform duration-200 ease-in-out"></app-svg>
            <app-svg name="folderOutline" svgClass="mr-2.5 h-4 w-4 shrink-0 text-sky-500 opacity-80"></app-svg>
            <span class="font-medium truncate">API Gateway V2</span>
          </div>
          <div class="pl-[22px] mt-0.5 folder-content hidden">
            <div
              class="flex items-center px-1.5 py-1.5 rounded-md hover:bg-black/5 dark:hover:bg-white/5 cursor-pointer text-gray-600 dark:text-gray-400 transition-colors mt-0.5">
              <app-svg name="circlePlus" svgClass="mr-2 h-4 w-4 text-[#e34c26]"></app-svg>
              <span>routes.rs</span>
            </div>
            <div
              class="flex items-center px-1.5 py-1.5 rounded-md hover:bg-black/5 dark:hover:bg-white/5 cursor-pointer text-gray-600 dark:text-gray-400 transition-colors mt-0.5">
              <app-svg name="circlePlus" svgClass="mr-2 h-4 w-4 text-[#e34c26]"></app-svg>
              <span>middleware.rs</span>
            </div>
            <div
              class="flex items-center px-1.5 py-1.5 rounded-md hover:bg-black/5 dark:hover:bg-white/5 cursor-pointer text-gray-600 dark:text-gray-400 transition-colors mt-0.5">
              <app-svg name="document" svgClass="mr-2 h-4 w-4"></app-svg>
              <span>README.md</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="folder-group mt-3 text-sm">
      <div
        class="flex items-center px-1.5 py-1.5 rounded-md hover:bg-black/5 dark:hover:bg-white/5 cursor-pointer text-gray-700 dark:text-gray-300 transition-colors"
        (click)="toggleFolderRecursive($event)">
        <app-svg name="chevronRight" svgClass="mr-2 h-3.5 w-3.5 shrink-0 rotate-90 opacity-60 transition-transform duration-200 ease-in-out"></app-svg>
        <app-svg name="folderSolid" svgClass="mr-2.5 h-4 w-4 shrink-0 text-emerald-500 opacity-80"></app-svg>
        <span class="font-medium truncate">Personal Notes</span>
      </div>

      <div class="pl-[22px] mt-0.5 folder-content" style="display: block">
        <div
          class="flex items-center px-1.5 py-1.5 rounded-md hover:bg-black/5 dark:hover:bg-white/5 cursor-pointer text-gray-600 dark:text-gray-400 transition-colors mt-0.5">
          <app-svg name="document" svgClass="mr-2 h-4 w-4"></app-svg>
          <span>12-Oct-Sync.md</span>
        </div>
        <div
          class="flex items-center px-1.5 py-1.5 rounded-md hover:bg-black/5 dark:hover:bg-white/5 cursor-pointer text-gray-600 dark:text-gray-400 transition-colors mt-0.5">
          <app-svg name="document" svgClass="mr-2 h-4 w-4"></app-svg>
          <span>Todo-List.md</span>
        </div>
        <div
          class="flex items-center px-1.5 py-1.5 rounded-md hover:bg-black/5 dark:hover:bg-white/5 cursor-pointer text-gray-600 dark:text-gray-400 transition-colors mt-0.5">
          <app-svg name="folderSolid" svgClass="mr-2 h-4 w-4 text-rose-500"></app-svg>
          <span>Archive</span>
        </div>
      </div>
    </div>

    <div class="folder-group mt-3 text-sm">
      <div
        class="flex items-center px-1.5 py-1.5 rounded-md hover:bg-black/5 dark:hover:bg-white/5 cursor-pointer text-gray-700 dark:text-gray-300 transition-colors"
        (click)="toggleFolderRecursive($event)">
        <app-svg name="chevronRight" svgClass="mr-2 h-3.5 w-3.5 shrink-0 opacity-60 transition-transform duration-200 ease-in-out"></app-svg>
        <app-svg name="folderSolid" svgClass="mr-2.5 h-4 w-4 shrink-0 text-purple-500 opacity-80"></app-svg>
        <span class="font-medium truncate">Code Snippets</span>
      </div>

      <div class="pl-[22px] mt-0.5 folder-content hidden">
        <div
          class="flex items-center px-1.5 py-1.5 rounded-md hover:bg-black/5 dark:hover:bg-white/5 cursor-pointer text-gray-600 dark:text-gray-400 transition-colors mt-0.5">
          <app-svg name="codeBrackets" svgClass="mr-2 h-4 w-4 text-yellow-500"></app-svg>
          <span>utilities.js</span>
        </div>
        <div
          class="flex items-center px-1.5 py-1.5 rounded-md hover:bg-black/5 dark:hover:bg-white/5 cursor-pointer text-gray-600 dark:text-gray-400 transition-colors mt-0.5">
          <app-svg name="document" svgClass="mr-2 h-4 w-4"></app-svg>
          <span>React-Hooks.md</span>
        </div>
      </div>
    </div>
  </div>

  <div
    class="m-2 ml-1 flex cursor-pointer items-center gap-2 rounded-xl border-t border-black/5 p-3 transition-colors hover:bg-black/5 dark:border-white/5 dark:hover:bg-white/5">

  </div>
</aside>
