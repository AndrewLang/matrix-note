<aside id="app-sidebar"
  class="z-10 flex h-full flex-shrink-0 flex-col overflow-hidden border-r border-black/10 bg-white/45 transition-all duration-300 dark:border-white/[0.06] dark:bg-black/25"
  [style.width.px]="isCollapsed() ? 48 : 260">
  <mtx-sidebar-actions [commands]="commands" [collapsed]="isCollapsed()" />

  @if (!isCollapsed()) {
  <div class="flex-1 overflow-y-auto pb-4 pt-1 select-none text-sm">
    <mtx-tree [nodes]="nodes()" />
  </div>
  }
</aside>
