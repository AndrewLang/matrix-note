<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notebook Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Include simplemde for the markdown editor -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/simplemde/latest/simplemde.min.css">
    <script src="https://cdn.jsdelivr.net/simplemde/latest/simplemde.min.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #313338;
            overflow: hidden;
        }

        /* Global Scrollbar */
        ::-webkit-scrollbar {
            width: 12px;
            height: 12px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background-color: #333333;
            border-radius: 10px;
            border: 3px solid transparent;
            background-clip: padding-box;
        }

        ::-webkit-scrollbar-thumb:hover {
            background-color: #4a4a4a;
        }

        /* Custom scrollbar matching the dark theme */
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #333333;
            border-radius: 10px;
            border: none;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background-color: #4a4a4a;
        }

        /* Root variable overrides to match image colors */
        .bg-app {
            background-color: #111111;
        }

        .bg-sidebar-nav {
            background-color: #171717;
        }

        .bg-sidebar-content {
            background-color: #1a1a1a;
        }

        .bg-tab-bar {
            background-color: #0d0d0d;
        }

        .text-dim {
            color: #828282;
        }

        .text-normal {
            color: #d4d4d4;
        }

        .text-active {
            color: #ffffff;
        }

        .border-color {
            border-color: #262626;
        }

        /* Tree view lines */
        .tree-line {
            position: absolute;
            left: -14px;
            top: -16px;
            bottom: 12px;
            width: 1px;
            background-color: #333333;
        }

        .tree-line-horizontal {
            position: absolute;
            left: -14px;
            top: 12px;
            width: 12px;
            height: 1px;
            background-color: #333333;
        }

        /* SimpleMDE overrides for dark theme */
        .editor-toolbar {
            display: none !important;
        }

        .CodeMirror {
            background-color: #111111;
            color: #d4d4d4;
            border: none;
            height: 100%;
            padding: 32px;
            font-size: 15px;
            line-height: 1.6;
            outline: none !important;
        }

        .CodeMirror-vscrollbar {
            right: 0px !important;
        }

        .CodeMirror-cursor {
            border-left-color: #ffffff;
        }

        .CodeMirror-focused {
            border: none !important;
            box-shadow: none !important;
            outline: none !important;
        }

        .CodeMirror pre.CodeMirror-line {
            padding: 0 4px;
        }
    </style>
</head>

<body class="flex items-center justify-center p-8 h-screen selection:bg-gray-500/30">

    <!-- Outermost container to simulate application window like the screenshot -->
    <div
        class="w-full max-w-[1400px] h-full bg-app rounded-xl overflow-hidden flex flex-col border border-[#2a2a2a] shadow-2xl shadow-black/50">

        <!-- Windows Titlebar -->
        <div
            class="h-[30px] bg-sidebar-nav flex items-center justify-between flex-shrink-0 select-none w-full border-b border-[#222222]">
            <div class="flex items-center gap-3 pl-4 w-1/3">
                <svg class="w-3.5 h-3.5 text-dim opacity-80" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M4 4h7v7H4V4zm0 9h7v7H4v-7zm9-9h7v7h-7V4zm0 9h7v7h-7v-7z" />
                </svg>
                <span class="text-[11px] text-dim tracking-wide font-medium">Notebook Editor</span>
            </div>

            <div class="flex-1 flex justify-center h-full items-center">
                <div
                    class="flex items-center bg-[#222222] rounded-[4px] w-[300px] h-[22px] px-2.5 text-[11px] border border-transparent hover:border-[#3a3a3a] transition-colors shadow-sm">

                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                    <input type="text" placeholder="Search Notebook Editor"

                </div>
            </div>

            <div class="flex h-full w-1/3 justify-end">

                    class="w-11 h-full flex items-center justify-center text-dim hover:bg-[#ffffff1a] transition-colors">

                        <path d="M 0 5 L 10 5" />
                    </svg>
                </button>
                <button
                    class="w-11 h-full flex items-center justify-center text-dim hover:bg-[#ffffff1a] transition-colors">

                        <path d="M 1 1 L 9 1 L 9 9 L 1 9 Z" />
                    </svg>
                </button>
                <button
                    class="w-11 h-full flex items-center justify-center text-dim hover:bg-[#e81123] hover:text-white transition-colors">
                    <svg class="w-2.5 h-2.5" stroke="currentColor" stroke-width="1.2" viewBox="0 0 10 10" fill="none">
                        <path d="M 1 1 L 9 9 M 9 1 L 1 9" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- App Content Row -->

            <!-- Nav Sidebar (Icons) -->

                <!-- Logo area -->
                <div class="w-8 h-8 rounded-lg bg-transparent flex items-center justify-center mb-8 cursor-pointer">

                    <svg width="24" height="24" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M11 20.3L4.1 16.3C4 16.2 4 16.1 4 16V8C4 7.9 4 7.8 4.1 7.7L11 3.7C11.6 3.4 12.4 3.4 13 3.7L19.9 7.7C20 7.8 20 7.9 20 8V16C20 16.1 20 16.2 19.9 16.3L13 20.3C12.4 20.6 11.6 20.6 11 20.3ZM12 11.6V18.1L17.5 14.9V8.6L12 11.6ZM10 11.6L4.5 8.6V14.9L10 18.1V11.6ZM12 4.4L7.5 7L12 9.6L16.5 7L12 4.4Z" />
                    </svg>
                </div>

                <!-- Nav Icons -->
                <div class="flex flex-col gap-4 w-full px-3">
                    <button
                        class="w-10 h-10 rounded-xl flex items-center justify-center text-dim hover:text-active hover:bg-[#222222] transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6">
                            </path>
                        </svg>
                    </button>
                    <button

                            </path>

                        </div>
                    </button>
                    <button
                        class="w-10 h-10 rounded-xl flex items-center justify-center text-dim hover:text-active hover:bg-[#222222] transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"

                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z">
                            </path>
                        </svg>
                    </button>
                </div>
            </nav>

            <!-- Sidebar Content (Knowledge Base Tree) -->
            <aside

                <!-- Header -->
                <div class="px-5 py-5 flex items-center justify-between">
                    <span class="text-active font-medium text-[15px]">Knowledge Base</span>
                    <div class="flex items-center gap-3 text-dim">

                        <button class="hover:text-active">

                                <rect x="3" y="3" width="18" height="18" rx="2" stroke-width="2"></rect>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Search -->
                <div class="px-5 mb-5">
                    <div class="relative flex items-center">
                        <svg class="absolute left-3 w-4 h-4 text-dim" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>

                        <input type="text" placeholder="Search..."

                </div>

                <!-- Folders/Tags Tabs -->

                    <div class="flex bg-[#0f0f0f] rounded-xl p-[3px] border border-[#222222]">
                        <button
                            class="flex-1 py-1.5 text-[13px] font-medium text-active bg-[#3a3a3a] rounded-[9px] shadow-sm">Folders</button>
                        <button
                            class="flex-1 py-1.5 text-[13px] font-medium text-dim hover:text-active transition-colors rounded-[9px]">Tags</button>
                    </div>
                </div>

                <!-- Tree View -->
                <div class="flex-1 overflow-y-auto custom-scrollbar px-3 pb-4">

                    <!-- Root item selected -->
                    <div
                        class="flex items-center justify-between px-3 py-2 bg-[#2a2a2a] rounded-lg cursor-pointer group mb-1">
                        <div class="flex items-center gap-2">
                            <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 20 20">
                                <path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"></path>
                            </svg>
                            <span class="text-[13px] font-medium text-active">General Knowledge</span>
                        </div>
                        <span
                            class="bg-[#3a3a3a] text-active text-[11px] px-2 py-0.5 rounded-full font-medium">10</span>
                    </div>

                    <!-- Children Container for General Knowledge -->
                    <div class="ml-5 pl-2">

                        <!-- Nested group 1: Onboarding -->
                        <div class="relative group mt-1">
                            <div class="tree-line bottom-[12px]"></div>
                            <div class="tree-line-horizontal"></div>
                            <div

                                <div class="flex items-center gap-2 relative">
                                    <svg class="w-4 h-4 text-dim" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z">
                                        </path>
                                    </svg>
                                    <span
                                        class="text-[13px] text-normal group-hover:text-active transition-colors">Onboarding</span>
                                </div>
                                <span
                                    class="text-dim text-[11px] font-medium opacity-0 group-hover:opacity-100 transition-opacity">3</span>
                            </div>

                            <!-- Subchildren -->
                            <div class="ml-5 pl-2 relative">
                                <div class="tree-line bottom-[12px]"></div>

                                <!-- Subfolder 1 -->
                                <div class="relative group mt-0.5">
                                    <div class="tree-line-horizontal"></div>
                                    <div
                                        class="flex items-center justify-between pl-3 pr-2 py-1.5 rounded-lg cursor-pointer hover:bg-[#222]">
                                        <div class="flex items-center gap-2">
                                            <svg class="w-4 h-4 text-dim" fill="none" stroke="currentColor"
                                                viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                    d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z">
                                                </path>
                                            </svg>
                                            <span
                                                class="text-[13px] text-normal group-hover:text-active transition-colors">Subfolder
                                                1</span>
                                        </div>
                                        <span
                                            class="text-dim text-[11px] font-medium opacity-0 group-hover:opacity-100 transition-opacity">5</span>
                                    </div>
                                </div>

                                <!-- Subfolder 2 -->
                                <div class="relative group mt-0.5 mb-1">
                                    <div class="tree-line-horizontal"></div>
                                    <div
                                        class="flex items-center justify-between pl-3 pr-2 py-1.5 rounded-lg cursor-pointer hover:bg-[#222]">
                                        <div class="flex items-center gap-2">
                                            <svg class="w-4 h-4 text-dim" fill="none" stroke="currentColor"
                                                viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                    d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z">
                                                </path>
                                            </svg>
                                            <span
                                                class="text-[13px] text-normal group-hover:text-active transition-colors">Subfolder
                                                2</span>
                                        </div>
                                        <span
                                            class="text-dim text-[11px] font-medium opacity-0 group-hover:opacity-100 transition-opacity">10</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Flat items next to Onboarding -->
                        <div class="relative group">
                            <div class="tree-line-horizontal"></div>
                            <div class="tree-line h-full bottom-0"></div> <!-- Connects down to end -->
                            <div
                                class="flex items-center justify-between pl-3 pr-2 py-1.5 rounded-lg cursor-pointer hover:bg-[#222]">
                                <div class="flex items-center gap-2">
                                    <svg class="w-4 h-4 text-dim" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z">
                                        </path>
                                    </svg>
                                    <span
                                        class="text-[13px] text-normal group-hover:text-active transition-colors">Integrations</span>
                                </div>
                            </div>
                        </div>

                        <div class="relative group">
                            <div class="tree-line-horizontal"></div>
                            <div
                                class="flex items-center justify-between pl-3 pr-2 py-1.5 rounded-lg cursor-pointer hover:bg-[#222]">
                                <div class="flex items-center gap-2">
                                    <svg class="w-4 h-4 text-dim" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z">
                                        </path>
                                    </svg>
                                    <span
                                        class="text-[13px] text-normal group-hover:text-active transition-colors">Documents</span>
                                </div>
                            </div>
                        </div>

                    </div>

                    <!-- Other Root Folders -->
                    <div
                        class="flex items-center justify-between px-3 py-2 rounded-lg cursor-pointer hover:bg-[#222] group mt-2">
                        <div class="flex items-center gap-2">
                            <svg class="w-4 h-4 text-dim" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z">
                                </path>
                            </svg>
                            <span class="text-[13px] text-normal group-hover:text-active transition-colors">Onboarding
                                Design</span>
                        </div>
                    </div>

                    <div
                        class="flex items-center justify-between px-3 py-2 rounded-lg cursor-pointer hover:bg-[#222] group mt-0.5">
                        <div class="flex items-center gap-2">
                            <svg class="w-4 h-4 text-dim" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z">
                                </path>
                            </svg>

            <!-- Main Workspace Area -->

                            <path fill-rule="evenodd"
                                d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z"
                                clip-rule="evenodd"></path>
                        </svg>
                        <span class="text-[12px] font-medium truncate flex-1">Onboarding-Guide.md</span>
                        <button
                            class="w-5 h-5 flex items-center justify-center rounded-md hover:bg-[#333] text-dim hover:text-active">×</button>
                    </div>

                    <!-- Inactive Tab 1 -->
                    <div
                        class="flex items-center h-[36px] px-4 rounded-t-lg bg-[#1a1a1a] border border-transparent hover:bg-[#222] text-dim hover:text-active cursor-pointer gap-2 min-w-[180px] border-b border-[#222222]">
                        <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd"
                                d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z"
                                clip-rule="evenodd"></path>
                        </svg>
                        <span class="text-[12px] font-medium truncate flex-1">Product-Roadmap.md</span>
                        <button
                            class="w-5 h-5 flex items-center justify-center rounded-md hover:bg-[#333] opacity-0 hover:opacity-100">×</button>
                    </div>

                    <!-- Inactive Tab 2 -->
                    <div
                        class="flex items-center h-[36px] px-4 rounded-t-lg bg-[#1a1a1a] border border-transparent hover:bg-[#222] text-dim hover:text-active cursor-pointer gap-2 min-w-[180px] border-b border-[#222222]">
                        <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd"
                                d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z"
                                clip-rule="evenodd"></path>
                        </svg>
                        <span class="text-[12px] font-medium truncate flex-1">Team-Interviews.md</span>
                        <button
                            class="w-5 h-5 flex items-center justify-center rounded-md hover:bg-[#333] opacity-0 hover:opacity-100">×</button>
                    </div>

                    <div class="border-b border-[#222222] h-full flex-1 flex items-end">
                        <button
                            class="w-8 h-[36px] flex items-center justify-center text-dim hover:text-active hover:bg-[#222] rounded-t-lg ml-1">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 4v16m8-8H4">
                                </path>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Content Area: Markdown Editor -->
                <div class="flex-1 w-full bg-app overflow-hidden flex flex-col pt-1">
                    <div
                        class="w-full h-full flex-1 border-none [&>.CodeMirror]:h-[calc(100vh-220px)] sm:[&>.CodeMirror]:h-full">
                        <textarea id="markdown-editor"># Onboarding Guide

Welcome to the team! This document will help you get set up.

## Quick Links
- [Internal Tools Dashboard](#)
- [HR Portal](#)
- [Team Directory](#)

## Day 1 Checklist
1. **Set up hardware** and verify permissions.
2. Review the *Company Code of Conduct*.
3. Schedule an introductory 1:1 with your manager.

Code block example:
```javascript
function greetTeam() {
    console.log("Hello, world!");
}
```

> **Note:** If you run into issues, post in the `#it-support` channel.

</textarea>
                    </div>
                </div>

            </main>
        </div><!-- End App Content Row -->
    </div>
